name: Build DawaCheck APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate Android platform folder
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.dawacheck --project-name dawa_check .
          fi

      - name: Fix build.gradle (compileSdk, minSdk, Kotlin)
        run: |
          # android/app/build.gradle
          APP_GRADLE="android/app/build.gradle"
          # compileSdk 35
          sed -i 's/compileSdk = 34/compileSdk = 35/g' $APP_GRADLE
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' $APP_GRADLE
          # minSdk 21
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' $APP_GRADLE
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' $APP_GRADLE
          # Kotlin JVM target
          echo '    kotlinOptions { jvmTarget = "17" }' >> $APP_GRADLE

          # android/build.gradle
          ROOT_GRADLE="android/build.gradle"
          # Set Kotlin version to 1.9.0
          if grep -q "ext.kotlin_version" $ROOT_GRADLE; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/g' $ROOT_GRADLE
          else
            sed -i '1i ext.kotlin_version = "1.9.0"' $ROOT_GRADLE
          fi

          # Also update settings.gradle if needed (plugins block)
          SETTINGS="android/settings.gradle"
          if [ -f "$SETTINGS" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.0"/g' $SETTINGS
          fi

      - name: Add required Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          for PERM in \
            'android.permission.CAMERA' \
            'android.permission.INTERNET' \
            'android.permission.POST_NOTIFICATIONS' \
            'android.permission.SCHEDULE_EXACT_ALARM' \
            'android.permission.RECEIVE_BOOT_COMPLETED'
          do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "0,/<application/s##<uses-permission android:name=\"$PERM\" \/>\n    <application#" "$MANIFEST"
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawa-check-apk
          path: build/app/outputs/flutter-apk/app-release.apk