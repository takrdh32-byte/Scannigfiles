name: Build DawaCheck APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate Android platform folder
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.dawacheck --project-name dawa_check .
          fi

      - name: Fix build.gradle (compileSdk, minSdk, Kotlin version)
        run: |
          # android/app/build.gradle: compileSdk 35, minSdk 21
          sed -i 's/compileSdk = 34/compileSdk = 35/g' android/app/build.gradle
          sed -i 's/compileSdkVersion 34/compileSdkVersion 35/g' android/app/build.gradle
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle

          # android/build.gradle: set kotlin_version to 1.9.0
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/g' android/build.gradle
          # If not present, add it after buildscript { 
          grep -q "ext.kotlin_version" android/build.gradle || sed -i '/buildscript {/a\    ext.kotlin_version = "1.9.0"' android/build.gradle

      - name: Add required Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          for PERM in \
            'android.permission.CAMERA' \
            'android.permission.INTERNET' \
            'android.permission.POST_NOTIFICATIONS' \
            'android.permission.SCHEDULE_EXACT_ALARM' \
            'android.permission.RECEIVE_BOOT_COMPLETED'
          do
            if ! grep -q "$PERM" "$MANIFEST"; then
              sed -i "0,/<application/s##<uses-permission android:name=\"$PERM\" \/>\n    <application#" "$MANIFEST"
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dawa-check-apk
          path: build/app/outputs/flutter-apk/app-release.apk