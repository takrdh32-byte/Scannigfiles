publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
  google_mlkit_text_recognition: ^0.11.0
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  intl: ^0.18.1
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.1          # 👈 Ye line hona chahiye
  timezone: ^0.9.2
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/